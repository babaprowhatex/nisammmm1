<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>birtanem nisamm</title>
<style>
:root{
  --pink:#ff5cad; --hot:#ff2f93; --soft:#ffd6e8; --glass:rgba(255,255,255,.17);
  --text:#fff; --shadow:0 25px 80px rgba(255,47,147,.28);
}
*{box-sizing:border-box}
body{
  margin:0; min-height:100vh; font-family:Inter,Arial,sans-serif; color:var(--text);
  background:#111 center/cover fixed no-repeat;
  overflow-x:hidden;
}
body::before{
  content:""; position:fixed; inset:0; z-index:-2;
  background:linear-gradient(115deg,rgba(0,0,0,.48),rgba(255,92,173,.25),rgba(0,0,0,.58));
  backdrop-filter:blur(2px);
}
body::after{
  content:""; position:fixed; inset:0; z-index:-1;
  background:radial-gradient(circle at 50% 15%,rgba(255,92,173,.35),transparent 35%);
}
.login{
  min-height:100vh; display:grid; place-items:center; padding:20px;
}
.loginBox,.player,.adminPanel,.section{
  background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.25);
  backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px);
  border-radius:34px; box-shadow:var(--shadow);
}
.loginBox{width:min(420px,100%); padding:32px; text-align:center}
.loginBox h1{font-size:34px;margin:10px 0}
input,textarea{
  width:100%; padding:14px 16px; border:0; border-radius:18px; margin:8px 0;
  outline:none; background:rgba(255,255,255,.82); color:#2b1020; font-weight:700;
}
textarea{min-height:90px;resize:vertical}
button{
  border:0; border-radius:999px; padding:13px 18px; cursor:pointer;
  background:linear-gradient(135deg,var(--hot),#ff8bc6); color:white; font-weight:900;
  box-shadow:0 12px 30px rgba(255,47,147,.35); transition:.25s;
}
button:hover{transform:translateY(-2px) scale(1.03)}
.hidden{display:none!important}
.wrap{max-width:1120px; margin:auto; padding:28px 14px 70px}
.top{display:flex; justify-content:center; gap:12px; margin-bottom:22px}
.player{max-width:560px; margin:0 auto 26px; padding:28px; text-align:center; position:relative}
.cover{
  width:116px; height:116px; object-fit:cover; border-radius:35px; margin:auto;
  border:3px solid rgba(255,255,255,.75); box-shadow:0 0 45px rgba(255,92,173,.8);
  animation:lovePulse 3.2s infinite ease-in-out;
}
@keyframes lovePulse{
  0%,100%{transform:scale(1) rotate(-2deg); box-shadow:0 0 28px rgba(255,92,173,.55)}
  50%{transform:scale(1.09) rotate(2deg); box-shadow:0 0 70px rgba(255,92,173,.95)}
}
h1{font-size:34px;line-height:1.05;margin:18px 0 8px;text-shadow:0 4px 20px rgba(0,0,0,.35)}
.sub{font-size:17px;font-weight:800;opacity:.95}
.now{margin:14px 0 18px;font-weight:900;color:#ffe1ef}
.bars{height:38px;display:flex;gap:7px;align-items:center;justify-content:center}
.bars i{width:8px;border-radius:9px;background:#ff82c1;animation:bar .7s infinite alternate}
.bars i:nth-child(2){animation-delay:.12s}.bars i:nth-child(3){animation-delay:.24s}.bars i:nth-child(4){animation-delay:.36s}
@keyframes bar{from{height:10px}to{height:32px}}
.controls{display:flex;justify-content:center;align-items:center;gap:18px;margin:18px}
.ctrl{width:58px;height:58px;border-radius:50%;font-size:20px;background:rgba(255,255,255,.25)}
.play{width:78px;height:78px;background:linear-gradient(135deg,#ff2790,#ff87c4);font-size:28px}
.row{display:flex;justify-content:space-between;font-weight:900;margin-top:10px}
input[type=range]{accent-color:var(--pink);padding:0}
.song{
  display:flex;align-items:center;gap:13px;padding:14px;margin:12px 0;border-radius:23px;
  background:rgba(255,255,255,.2); cursor:pointer; transition:.25s; text-align:left
}
.song:hover,.song.active{background:rgba(255,92,173,.36); transform:scale(1.02)}
.song img{width:58px;height:58px;border-radius:17px;object-fit:cover}
.song b{display:block;font-size:17px}.song small{opacity:.9}
.heartBtn{margin-left:auto;background:rgba(255,255,255,.22);box-shadow:none}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}
.section{padding:24px;margin-top:18px}
.section h2{margin:0 0 12px;font-size:25px}
.memory{padding:13px 15px;background:rgba(255,255,255,.18);border-radius:20px;margin:10px 0;font-weight:750}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px}
.gallery img{width:100%;height:170px;object-fit:cover;border-radius:22px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
.adminPanel{max-width:820px;margin:20px auto;padding:24px}
.adminPanel h2{margin-top:0}
.adminGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}
.floatingHeart{
  position:fixed; font-size:24px; pointer-events:none; z-index:5; opacity:.75;
  animation:floatUp linear forwards; filter:drop-shadow(0 0 8px #ff5cad)
}
@keyframes floatUp{to{transform:translateY(-110vh) rotate(40deg);opacity:0}}
.loveLetter{font-size:17px;line-height:1.65;font-weight:700;white-space:pre-wrap}
@media(max-width:620px){
  body{background-attachment:scroll}
  .wrap{padding:14px 10px 50px}
  h1{font-size:27px}
  .player,.section,.adminPanel{border-radius:26px;padding:18px}
  .top{flex-wrap:wrap;gap:8px}
  .top button{flex:1;min-width:140px}
  .cover{width:104px;height:104px}
  .controls{gap:10px}
  .ctrl{width:52px;height:52px}
  .play{width:70px;height:70px}
  .gallery img{height:145px}
}
@supports (-webkit-touch-callout:none){
  input,textarea,button{font-size:16px}
  .player,.section,.adminPanel,.loginBox{-webkit-backdrop-filter:blur(18px)}
}

.badgeLine{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:14px 0}
.badge{padding:9px 13px;border-radius:999px;background:rgba(255,255,255,.18);font-weight:900}
.quoteBox{font-size:18px;font-weight:900;line-height:1.55;margin-top:12px;color:#ffe1ef}
.countBox{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:15px}
.countBox div{background:rgba(255,255,255,.18);border-radius:18px;padding:12px 6px;font-weight:900}
.countBox b{display:block;font-size:23px}
select{width:100%;padding:14px 16px;border:0;border-radius:18px;margin:8px 0;outline:none;background:rgba(255,255,255,.82);color:#2b1020;font-weight:900}

#songs{max-height:360px;overflow-y:auto;padding-right:4px}
#adminSongList{max-height:240px;overflow-y:auto;margin-top:10px}
.adminSongItem{display:flex;gap:8px;align-items:center;justify-content:space-between;background:rgba(255,255,255,.16);padding:10px;border-radius:16px;margin:8px 0;font-weight:800}
.adminSongItem button{padding:8px 11px}

.adminMemoryItem{
  background:rgba(255,255,255,.16);
  padding:10px;
  border-radius:16px;
  margin:8px 0;
}
.adminMemoryItem textarea{
  min-height:58px;
  margin:0 0 8px;
}
.adminMemoryBtns{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.adminMemoryBtns button{
  padding:8px 12px;
}
#adminMemoryList{
  max-height:280px;
  overflow-y:auto;
  margin-top:10px;
}
</style>
</head>
<body>
<div id="login" class="login">
  <div class="loginBox">
    <div style="font-size:54px">💗</div>
    <h1>Bizim Gizli Dünyamız</h1>
    <p class="sub">Sadece ikimizin kalbine ait küçük bir yer.</p>
    <input id="pass" type="password" placeholder="Şifreyi yaz..." />
    <button onclick="enterSite()">Aç Kalbimi</button>
    <p id="err" style="color:#ffd6e8;font-weight:900"></p>
  </div>
</div>

<div id="site" class="hidden">
  <div class="wrap">
    <div class="top">
      <button onclick="openAdminLogin()">🔐 Gizli Admin</button>
      <button onclick="toggleTheme()">🌙 / ☀️</button>
      <button onclick="loveBoom()">💞 Kalp Yağmuru</button>
    </div>

    <div class="player">
      <img id="cover" class="cover" src="" alt="kapak">
      <h1 id="title"></h1>
      <div id="desc" class="sub"></div><div class="badgeLine"><span class="badge" id="nickBadge"></span><span class="badge" id="dateBadge"></span></div><div id="quoteBox" class="quoteBox"></div><div id="countBox" class="countBox"></div>
      <div class="now">Şu an: <span id="now"></span></div>
      <div class="bars"><i></i><i></i><i></i><i></i></div>
      <audio id="audio"></audio>
      <div class="controls">
        <button class="ctrl" onclick="prevSong()">⏮</button>
        <button id="playBtn" class="play" onclick="togglePlay()">▶</button>
        <button class="ctrl" onclick="nextSong()">⏭</button>
      </div>
      <div class="row"><span id="cur">0:00</span><span id="dur">0:00</span></div>
      <input id="progress" type="range" min="0" max="100" value="0" oninput="seekSong(this.value)">
      <div class="row"><span>🔊 Ses</span><span id="volText">100%</span></div>
      <input type="range" min="0" max="100" value="100" oninput="setVol(this.value)">
      <div id="songs"></div>
    </div>

    <div class="grid">
      <div class="section">
        <h2>💌 Sana Söylemek İstediklerim</h2>
        <div id="letter" class="loveLetter"></div>
      </div>
      <div class="section">
        <h2>📅 Bizim Anılarımız</h2>
        <div id="memories"></div>
      </div>
    </div>

    <div class="section">
      <h2>📸 Galerimiz</h2>
      <div id="gallery" class="gallery"></div>
    </div>

    <div id="adminLogin" class="adminPanel hidden">
      <button onclick="closeAdminLogin()">⬅ Geri</button>
      <h2>🔐 Gizli Admin Girişi</h2>
      <p class="sub">Admin paneli sadece şifreyle açılır.</p>
      <input id="adminPassInput" type="password" placeholder="Admin şifresi">
      <button onclick="checkAdminPass()">Panele Gir</button>
      <p id="adminErr" style="color:#ffd6e8;font-weight:900"></p>
    </div>

    <div id="admin" class="adminPanel hidden">
      <button onclick="closeAdmin()">⬅ Geri</button>
      <h2>Admin Paneli</h2>
      <div class="adminGrid">
        <div><input id="aTitle" placeholder="Başlık"><input id="aDesc" placeholder="Alt yazı"><textarea id="aLetter" placeholder="Aşk mektubu"></textarea><button onclick="saveTexts()">Yazıları Kaydet</button></div>
        <div>
          <input id="bgUrl" placeholder="Arka plan foto linki">
          <input type="file" id="bgFile" accept="image/*">
          <input id="coverUrl" placeholder="Kapak foto linki">
          <input type="file" id="coverFile" accept="image/*">
          <button onclick="saveImages()">Fotoğrafları Kaydet</button>
        </div>
        <div>
          <input id="songName" placeholder="Şarkı adı">
          <input id="songArtist" placeholder="Şarkı açıklaması">
          <input id="songUrl" placeholder="MP3 linki">
          <input type="file" id="songFile" accept="audio/*">
          <input id="songCover" placeholder="Şarkı kapak linki">
          <button onclick="addSong()">Şarkı Ekle</button>
          <button onclick="clearSongs()">Tüm Şarkıları Sil</button>
          <div id="adminSongList"></div>
        </div>
        <div>
          <input id="memText" placeholder="Yeni anı yazısı">
          <button onclick="addMemory()">Anı Ekle</button>
          <div id="adminMemoryList"></div>
          <input id="galUrl" placeholder="Galeri foto linki">
          <input type="file" id="galFile" accept="image/*">
          <button onclick="addGallery()">Foto Ekle</button>
        </div>
        <div>
          <input id="nickName" placeholder="Sevgili ismi / lakap">
          <input id="startDate" type="date">
          <input id="quoteText" placeholder="Kısa romantik söz">
          <button onclick="saveExtra()">Ek Bilgileri Kaydet</button>
          <select id="colorPick">
            <option value="#ff5cad">Pembe</option>
            <option value="#b56cff">Mor</option>
            <option value="#ff4d6d">Kırmızı</option>
            <option value="#00c2ff">Mavi</option>
            <option value="#ff9f1c">Turuncu</option>
          </select>
          <button onclick="saveColor()">Tema Rengini Değiştir</button>
        </div>
        <div>
          <input id="newPass" placeholder="Yeni site giriş şifresi">
          <button onclick="savePass()">Site Şifresini Değiştir</button>
          <input id="newAdminPass" placeholder="Yeni admin şifresi">
          <button onclick="saveAdminPass()">Admin Şifresini Değiştir</button>
          <button onclick="toggleHearts()">Kalp Efekti Aç/Kapat</button>
          <button onclick="resetAll()">Her şeyi sıfırla</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const def={
 pass:"1234",
 adminPass:"admin123",
 nick:"Aşkım",
 startDate:"2024-01-01",
 quote:"İyi ki varsın, iyi ki benimlesin.",
 color:"#ff5cad",
 hearts:true,
 title:"Ben Bir Tek Kadın Sevdim",
 desc:"sen benim tek huzur kaynağımsın",
 letter:"Ben seni sadece güzel günlerde değil, en sessiz anlarda bile sevdim. Kalbimin en yumuşak yeri hep sana ait. Ne olursa olsun, bu sayfa bize ait küçük bir sonsuzluk olarak kalsın.",
 bg:"https://images.unsplash.com/photo-1518895949257-7621c3c786d7?auto=format&fit=crop&w=1600&q=80",
 cover:"https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&w=500&q=80",
 songs:[],
 memories:["İlk gülümsediğin anı hiç unutmadım.","Seninle geçen her saniye kalbimde ayrı bir yer açtı."],
 gallery:["https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?auto=format&fit=crop&w=700&q=80"]
};
const STORAGE_KEY="loveSite_adminSongsOnly_v3";
let data=JSON.parse(localStorage.getItem(STORAGE_KEY)||"null")||def, idx=0;
const audio=document.getElementById("audio");
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(data))}
function render(){
 document.body.style.backgroundImage=`url('${data.bg}')`;
 document.documentElement.style.setProperty('--pink',data.color||'#ff5cad');
 document.documentElement.style.setProperty('--hot',data.color||'#ff2f93');
 nickBadge.textContent='💘 '+(data.nick||'Aşkım');
 dateBadge.textContent='📅 '+(data.startDate||'Bizim günümüz');
 quoteBox.textContent='“'+(data.quote||'İyi ki varsın.')+'”';
 updateCounter();
 title.textContent=data.title; desc.textContent=data.desc; letter.textContent=data.letter; cover.src=data.cover;
 songs.innerHTML=data.songs.map((s,i)=>`<div class="song ${i==idx?'active':''}" onclick="loadSong(${i},true)"><img src="${s.cover||data.cover}"><div><b>💗 ${s.name}</b><small>${s.artist||'Bizim şarkımız'}</small></div><button class="heartBtn" onclick="event.stopPropagation();loveBoom()">♡</button></div>`).join("");
 memories.innerHTML=data.memories.map(m=>`<div class="memory">💞 ${m}</div>`).join("");
 gallery.innerHTML=data.gallery.map(g=>`<img src="${g}">`).join("");
 if(data.songs.length>0){loadSong(idx,false)} else {
  now.textContent="Henüz şarkı eklenmedi";
  audio.removeAttribute("src"); audio.load(); playBtn.textContent="▶";
  songs.innerHTML='<div class="song active"><div><b>🎵 Şarkı yok</b><small>Admin panelinden ekleyebilirsin</small></div></div>';
 }
 renderAdminSongs(); renderAdminMemories();
}
function enterSite(){ if(pass.value===data.pass){login.classList.add("hidden");site.classList.remove("hidden");render(); renderAdminSongs(); renderAdminMemories();loveBoom()} else err.textContent="Şifre yanlış aşkım 💔"; }
function loadSong(i,play){
 if(!data.songs.length){playBtn.textContent="▶";return}
 idx=((i%data.songs.length)+data.songs.length)%data.songs.length;
 let s=data.songs[idx];
 now.textContent=s.name;
 cover.src=s.cover||data.cover;
 audio.src=s.url||"";
 renderSongsOnly();
 if(play&&s.url){
   audio.play().then(()=>{playBtn.textContent="⏸"}).catch(()=>{playBtn.textContent="▶"});
 }else{
   playBtn.textContent="▶";
 }
}
function renderSongsOnly(){[...document.querySelectorAll(".song")].forEach((e,i)=>e.classList.toggle("active",i==idx))}
function togglePlay(){
 if(!data.songs.length){
   playBtn.textContent="▶";
   loveBoom();
   return;
 }
 if(!audio.src){ loadSong(idx,false); }
 if(audio.paused){
   audio.play().then(()=>{playBtn.textContent="⏸"}).catch(()=>{playBtn.textContent="▶"});
 }else{
   audio.pause();
   playBtn.textContent="▶";
 }
}
function nextSong(){if(!data.songs.length)return;loadSong((idx+1)%data.songs.length,true)}
function prevSong(){if(!data.songs.length)return;loadSong((idx-1+data.songs.length)%data.songs.length,true)}
function fmt(t){return Math.floor(t/60)+":"+String(Math.floor(t%60)).padStart(2,"0")}
audio.ontimeupdate=()=>{progress.value=(audio.currentTime/(audio.duration||1))*100;cur.textContent=fmt(audio.currentTime);dur.textContent=audio.duration?fmt(audio.duration):"0:00"}
audio.onended=()=>{playBtn.textContent="▶"; nextSong()}
function seekSong(v){audio.currentTime=(v/100)*(audio.duration||0)} function setVol(v){audio.volume=v/100;volText.textContent=v+"%"}
function fillAdmin(){ setTimeout(()=>{renderAdminSongs();renderAdminMemories();},0);
 aTitle.value=data.title||''; aDesc.value=data.desc||''; aLetter.value=data.letter||'';
 nickName.value=data.nick||''; startDate.value=data.startDate||''; quoteText.value=data.quote||'';
 colorPick.value=data.color||'#ff5cad';
}
function openAdminLogin(){fillAdmin();adminLogin.classList.remove("hidden");admin.classList.add("hidden");window.scrollTo({top:adminLogin.offsetTop,behavior:"smooth"})}
function closeAdminLogin(){adminLogin.classList.add("hidden")}
function checkAdminPass(){
 if(adminPassInput.value===data.adminPass){
   adminLogin.classList.add("hidden"); admin.classList.remove("hidden"); adminErr.textContent="";
   window.scrollTo({top:admin.offsetTop,behavior:"smooth"});
 }else adminErr.textContent="Admin şifresi yanlış 💔";
}
function closeAdmin(){admin.classList.add("hidden")}
function saveTexts(){data.title=aTitle.value||data.title;data.desc=aDesc.value||data.desc;data.letter=aLetter.value||data.letter;save();render()}
function fileToDataURL(file){
 return new Promise((res,rej)=>{let r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file)})
}
async function saveImages(){
 if(bgFile.files[0]) data.bg=await fileToDataURL(bgFile.files[0]); else data.bg=bgUrl.value||data.bg;
 if(coverFile.files[0]) data.cover=await fileToDataURL(coverFile.files[0]); else data.cover=coverUrl.value||data.cover;
 save();render();loveBoom();
}
async function addSong(){
 let name=songName.value.trim();
 let artist=songArtist.value.trim();
 let url=songUrl.value.trim();
 if(songFile.files[0]) url=await fileToDataURL(songFile.files[0]);
 if(!name){alert("Şarkı adı yazmalısın");return}
 if(!url){alert("MP3 linki gir veya dosya seç");return}
 data.songs.push({name:name,artist:artist||"Bizim şarkımız",url:url,cover:songCover.value.trim()||data.cover});
 songName.value=""; songArtist.value=""; songUrl.value=""; songCover.value=""; songFile.value="";
 save(); render(); renderAdminSongs(); renderAdminMemories(); loveBoom();
}
function deleteSong(i){
 if(!confirm("Bu şarkı silinsin mi?"))return;
 data.songs.splice(i,1);
 if(idx>=data.songs.length)idx=0;
 save(); render(); renderAdminSongs(); renderAdminMemories();
}
function clearSongs(){
 if(!confirm("Tüm şarkılar silinsin mi?"))return;
 data.songs=[]; idx=0; save(); render(); renderAdminSongs(); renderAdminMemories();
}
function renderAdminSongs(){
 if(!window.adminSongList)return;
 adminSongList.innerHTML=data.songs.length?data.songs.map((s,i)=>`<div class="adminSongItem"><span>${i+1}. ${s.name}</span><button onclick="deleteSong(${i})">Sil</button></div>`).join(""):"<div class='memory'>Henüz şarkı yok.</div>";
}
function addMemory(){
 if(memText.value.trim()){
   data.memories.push(memText.value.trim());
   memText.value="";
   save();render();renderAdminMemories();
 }
}
function updateMemory(i){
 const el=document.getElementById("memoryEdit_"+i);
 if(!el)return;
 data.memories[i]=el.value.trim()||data.memories[i];
 save();render();renderAdminMemories();
}
function deleteMemory(i){
 if(!confirm("Bu anı silinsin mi?"))return;
 data.memories.splice(i,1);
 save();render();renderAdminMemories();
}
function renderAdminMemories(){
 if(!window.adminMemoryList)return;
 adminMemoryList.innerHTML=data.memories.length?data.memories.map((m,i)=>`
   <div class="adminMemoryItem">
     <textarea id="memoryEdit_${i}">${m.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</textarea>
     <div class="adminMemoryBtns">
       <button onclick="updateMemory(${i})">Kaydet</button>
       <button onclick="deleteMemory(${i})">Sil</button>
     </div>
   </div>`).join(""):"<div class='memory'>Henüz anı yok.</div>";
}
async function addGallery(){
 if(galFile.files[0]) data.gallery.push(await fileToDataURL(galFile.files[0]));
 else if(galUrl.value) data.gallery.push(galUrl.value);
 save();render();loveBoom();
}
function savePass(){if(newPass.value){data.pass=newPass.value;save();alert("Site giriş şifresi değişti")}}
function saveAdminPass(){if(newAdminPass.value){data.adminPass=newAdminPass.value;save();alert("Admin şifresi değişti")}}
function resetAll(){
 localStorage.removeItem(STORAGE_KEY);
 localStorage.removeItem("loveSite");
 localStorage.removeItem("loveSite_adminSongsOnly_v2");
 location.reload();
}
function toggleTheme(){document.body.classList.toggle("light");loveBoom()}
function loveBoom(){if(data.hearts===false)return;for(let i=0;i<22;i++)setTimeout(()=>heart(),i*45)}
function saveExtra(){
 data.nick=nickName.value||data.nick;
 data.startDate=startDate.value||data.startDate;
 data.quote=quoteText.value||data.quote;
 save();render();loveBoom();
}
function saveColor(){data.color=colorPick.value;save();render();loveBoom()}
function toggleHearts(){data.hearts = data.hearts===false ? true : false; save(); alert(data.hearts?'Kalpler açıldı':'Kalpler kapandı')}
function updateCounter(){
 let start=new Date(data.startDate||'2024-01-01');
 let nowDate=new Date();
 let diff=Math.max(0,nowDate-start);
 let days=Math.floor(diff/86400000);
 let hours=Math.floor((diff%86400000)/3600000);
 let mins=Math.floor((diff%3600000)/60000);
 let secs=Math.floor((diff%60000)/1000);
 countBox.innerHTML=`<div><b>${days}</b>Gün</div><div><b>${hours}</b>Saat</div><div><b>${mins}</b>Dk</div><div><b>${secs}</b>Sn</div>`;
}
setInterval(updateCounter,1000);
function heart(){if(data.hearts===false)return;let h=document.createElement("div");h.className="floatingHeart";h.textContent=["💗","💖","💕","💞"][Math.floor(Math.random()*4)];h.style.left=Math.random()*100+"vw";h.style.bottom="-30px";h.style.animationDuration=3+Math.random()*3+"s";document.body.appendChild(h);setTimeout(()=>h.remove(),6500)}
setInterval(heart,1300);
render();
</script>
</body>
</html>
